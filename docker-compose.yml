version: '3.8'

services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
    image: docker-openclaw:latest
    container_name: docker-openclaw
    ports:
      - "18789:18789"
    volumes:
      - ./config/openclaw.json:/root/.openclaw/openclaw.json
      - ./prod/workspace:/root/.openclaw/workspace
      - ./prod/agents:/root/.openclaw/agents
      - ./prod/canvas:/root/.openclaw/canvas
      - ./prod/credentials:/root/.openclaw/credentials
      - ./prod/cron:/root/.openclaw/cron
      - ./prod/logs:/root/.openclaw/logs
      - ./prod/memory:/root/.openclaw/memory
    environment:
      - TZ=Asia/Shanghai
      - MINIMAX_API_KEY=YOUR_MINIMAX_API_KEY
      - ALIYUNCS_API_KEY=YOUR_ALIYUNCS_API_KEY
      - PRIMARY_MODEL=aliyuncs/qwen3.5-plus
      - PRIMARY_VL_MODEL=aliyuncs/qwen3-vl-plus
      - WEBCHAT_TOKEN=WHAT_EVER_YOU_WANT
      - FEISHU_APP_ID=YOUR_FEISHU_APP_ID
      - FEISHU_APP_SECRET=YOUR_FEISHU_APP_SECRET
      - QYWECHAT_BOT_ID=YOUR_QYWECHAT_BOT_ID
      - QYWECHAT_SECRET=YOUR_QYWECHAT_SECRET
    restart: unless-stopped
    networks:
      - openclaw-network

networks:
  openclaw-network:
    driver: bridge